<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse | Student Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="app-wrapper">

        <!-- ── Header ── -->
        <header class="app-header">
            <div class="header-inner">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="logo-text">
                        <h1>EduPulse</h1>
                        <span>Student Information System</span>
                    </div>
                </div>
                <div class="header-stats">
                    <div class="stat-chip">
                        <i class="fas fa-users"></i>
                        <span id="totalCount">0</span>&nbsp;Students
                    </div>
                    <div class="stat-chip gcp">
                        <i class="fas fa-cloud"></i>
                        GCP Powered
                    </div>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="app-main">

            <!-- Form Panel -->
            <section class="panel form-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-icon"><i class="fas fa-user-plus"></i></span>
                        <h2 id="formTitle">Add New Student</h2>
                    </div>
                </div>
                <div class="panel-body">
                    <form id="studentForm" enctype="multipart/form-data">

                        <div class="photo-upload-area">
                            <div id="imagePreview" class="photo-preview" onclick="document.getElementById('studentImage').click()">
                                <div class="photo-placeholder">
                                    <i class="fas fa-camera"></i>
                                    <span>Upload Photo</span>
                                </div>
                            </div>
                            <input type="file" id="studentImage" name="image" accept="image/*" hidden>
                            <button type="button" class="btn-photo" onclick="document.getElementById('studentImage').click()">
                                <i class="fas fa-upload"></i> Choose Photo
                            </button>
                        </div>

                        <div class="input-field">
                            <i class="fas fa-user field-icon"></i>
                            <input type="text" id="studentName" name="name" placeholder=" " required>
                            <label for="studentName">Full Name *</label>
                        </div>

                        <div class="input-field">
                            <i class="fas fa-map-marker-alt field-icon"></i>
                            <input type="text" id="studentAddress" name="address" placeholder=" " required>
                            <label for="studentAddress">Address *</label>
                        </div>

                        <div class="input-field">
                            <i class="fas fa-phone field-icon"></i>
                            <input type="tel" id="studentContact" name="contact" placeholder=" " required>
                            <label for="studentContact">Contact Number *</label>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="fas fa-plus-circle"></i> Add Student
                            </button>
                            <button type="reset" class="btn btn-ghost" id="resetBtn">
                                <i class="fas fa-times"></i> Clear
                            </button>
                        </div>

                    </form>
                </div>
            </section>

            <!-- Table Panel -->
            <section class="panel table-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-icon"><i class="fas fa-list-ul"></i></span>
                        <h2>Students Directory</h2>
                    </div>
                    <div class="panel-actions">
                        <div class="search-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search students…">
                        </div>
                        <button class="btn btn-icon" id="refreshBtn" title="Refresh">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="panel-body no-pad">
                    <div id="loadingSpinner" class="loader-wrap" style="display:none;">
                        <div class="loader"></div>
                    </div>
                    <div class="table-wrapper">
                        <table id="studentsTable">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Photo</th>
                                    <th>Full Name</th>
                                    <th>Address</th>
                                    <th>Contact</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr class="no-data">
                                    <td colspan="6">
                                        <div class="empty-state">
                                            <i class="fas fa-hourglass-half"></i>
                                            <span>Loading students…</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- ── Edit Modal ── -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-head">
                <h3><i class="fas fa-edit"></i> Edit Student</h3>
                <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="editForm" enctype="multipart/form-data">
                    <input type="hidden" id="editId">

                    <div class="photo-upload-area">
                        <div id="editImagePreview" class="photo-preview" onclick="document.getElementById('editImage').click()">
                            <div class="photo-placeholder">
                                <i class="fas fa-camera"></i>
                                <span>Upload Photo</span>
                            </div>
                        </div>
                        <input type="file" id="editImage" accept="image/*" hidden>
                        <button type="button" class="btn-photo" onclick="document.getElementById('editImage').click()">
                            <i class="fas fa-upload"></i> Change Photo
                        </button>
                    </div>

                    <div class="input-field">
                        <i class="fas fa-user field-icon"></i>
                        <input type="text" id="editName" placeholder=" " required>
                        <label for="editName">Full Name *</label>
                    </div>

                    <div class="input-field">
                        <i class="fas fa-map-marker-alt field-icon"></i>
                        <input type="text" id="editAddress" placeholder=" " required>
                        <label for="editAddress">Address *</label>
                    </div>

                    <div class="input-field">
                        <i class="fas fa-phone field-icon"></i>
                        <input type="tel" id="editContact" placeholder=" " required>
                        <label for="editContact">Contact Number *</label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <button type="button" class="btn btn-ghost" id="cancelEditBtn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
                <div id="editMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- ── Delete Confirmation Modal ── -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-box modal-sm">
            <div class="modal-head danger">
                <h3><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
            </div>
            <div class="modal-body">
                <div class="delete-warning">
                    <div class="warning-icon"><i class="fas fa-trash-alt"></i></div>
                    <p>Are you sure you want to delete this student?<br>
                       <strong>This action cannot be undone.</strong></p>
                </div>
                <div class="form-actions center">
                    <button class="btn btn-danger" id="confirmDeleteBtn">
                        <i class="fas fa-trash-alt"></i> Yes, Delete
                    </button>
                    <button class="btn btn-ghost" id="cancelDeleteBtn">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
