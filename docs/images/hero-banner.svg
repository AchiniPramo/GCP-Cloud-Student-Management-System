<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GCP Cloud Student Management System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="45%" stop-color="#1c2541"/>
      <stop offset="100%" stop-color="#3a506b"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5bc0be"/>
      <stop offset="100%" stop-color="#6fffe9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="150" fill="#6fffe9" opacity="0.08"/>
  <circle cx="980" cy="300" r="180" fill="#5bc0be" opacity="0.08"/>

  <g filter="url(#soft)">
    <rect x="56" y="48" width="1088" height="264" rx="20" fill="#ffffff" opacity="0.06"/>
  </g>

  <text x="90" y="130" fill="#e0fbfc" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    GCP Cloud Student Management System
  </text>
  <text x="90" y="176" fill="#c7d9e2" font-family="Segoe UI, Arial, sans-serif" font-size="23">
    Spring Boot + PostgreSQL + Google Cloud Storage
  </text>
  <text x="90" y="214" fill="#c7d9e2" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Clean REST APIs, modern web UI, and cloud-ready image handling
  </text>

  <rect x="90" y="242" width="214" height="42" rx="21" fill="url(#chip)"/>
  <text x="122" y="270" fill="#102a43" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    Production Style
  </text>

  <rect x="322" y="242" width="196" height="42" rx="21" fill="url(#chip)"/>
  <text x="362" y="270" fill="#102a43" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    CRUD + Upload
  </text>

  <rect x="536" y="242" width="214" height="42" rx="21" fill="url(#chip)"/>
  <text x="576" y="270" fill="#102a43" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    Cloud Native
  </text>
</svg>

